[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="super_coal.png"
authors="TechDahTurtle & Lemon_Juiced"
description='''
Super Coal is a small mod that adds different types of coal from Tiny Coal to Compressed Coal to fit you every smelting need. Along with more torches.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="scalar_core"
    type="required"
    versionRange="=[26.1.2-1.1.1,)"
    ordering="NONE"
    side="BOTH"
